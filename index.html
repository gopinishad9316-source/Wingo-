<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GKING V100.1 - SUPREME COPY</title>
    <style>
        :root { --neon: #00ff88; --cyan: #00d2ff; --bg: #010103; --card: #0a0a12; --win: #00ff88; --loss: #ff3366; --gold: #ffea00; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; overflow-x: hidden; }
        .wrapper { width: 100%; max-width: 460px; min-height: 100vh; background: var(--card); border: 1px solid #1a1e2e; border-radius: 45px; padding: 25px; box-shadow: 0 0 60px rgba(0, 210, 255, 0.1); position: relative; }
        
        .header { text-align: center; border-bottom: 2px solid #1a1e2e; margin-bottom: 25px; padding-bottom: 10px; }
        .header h1 { font-size: 26px; margin: 0; background: linear-gradient(to right, var(--cyan), #fff, var(--neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; letter-spacing: 2px; }

        .status-row { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .s-box { background: #000; border: 1px solid #222; padding: 10px 15px; border-radius: 15px; text-align: center; flex: 1; margin: 0 5px; }
        .s-box span { font-size: 8px; color: #555; display: block; text-transform: uppercase; }
        #timerText { font-size: 18px; font-weight: 900; color: var(--loss); font-family: monospace; }
        #syncStatus { font-size: 10px; color: var(--neon); font-weight: bold; }

        .hub { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .hub-box { background: #000; padding: 15px; border-radius: 20px; border: 1px solid #1a1e2e; text-align: center; }
        .hub-box b { font-size: 20px; color: #fff; }

        .screen { background: radial-gradient(circle at center, #111522 0%, #010206 100%); border: 2px solid #1a1e2e; border-radius: 40px; padding: 40px 10px; text-align: center; margin-bottom: 25px; position: relative; overflow: hidden; }
        #periodId { font-size: 11px; color: #444; margin-bottom: 12px; font-family: monospace; }
        #prediction { font-size: 75px; font-weight: 900; margin: 0; color: #111; transition: 0.4s; letter-spacing: 10px; }
        .target-node { background: rgba(255, 234, 0, 0.1); border: 2px solid var(--gold); border-radius: 50%; width: 55px; height: 55px; line-height: 55px; font-size: 32px; font-weight: 900; color: var(--gold); margin: 15px auto 0; text-shadow: 0 0 15px var(--gold); }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .btn { padding: 18px; border-radius: 20px; border: none; font-weight: 900; cursor: pointer; transition: 0.2s; font-size: 15px; text-transform: uppercase; }
        .btn-win { background: var(--win); color: #000; }
        .btn-loss { background: var(--loss); color: #fff; }

        .history-card { background: #000; border-radius: 35px; padding: 20px; border: 1px solid #111; }
        .history-card h3 { font-size: 10px; color: #333; text-align: center; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 2px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #080808; font-family: monospace; }
        .win-t { color: var(--win); font-weight: bold; }
        .loss-t { color: var(--loss); font-weight: bold; }

        /* Naya Copy Button Style */
        .copy-btn { width: 100%; padding: 12px; background: var(--cyan); color: #000; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; margin-top: 15px; text-transform: uppercase; font-size: 12px; }
        .copy-btn:active { transform: scale(0.95); background: #fff; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header"><h1>GKING V100.1</h1></div>

    <div class="status-row">
        <div class="s-box"><span>COUNTDOWN</span><b id="timerText">00:30</b></div>
        <div class="s-box"><span>STATUS</span><b id="syncStatus">AUTO SYNC</b></div>
    </div>

    <div class="hub">
        <div class="hub-box"><span>STAKE</span><b id="betAmt">₹10</b></div>
        <div class="hub-box"><span>LEVEL</span><b id="lvlStep">L 1</b></div>
    </div>

    <div class="screen">
        <div id="periodId">PERIOD ID: ---</div>
        <div id="prediction">SCAN</div>
        <div class="target-node" id="targetNum">?</div>
        <div style="font-size: 9px; color: var(--gold); margin-top: 10px; letter-spacing: 2px;">NEURAL TARGET</div>
    </div>

    <div class="controls">
        <button class="btn btn-win" onclick="handleResult(true)">WON (RESET)</button>
        <button class="btn btn-loss" onclick="handleResult(false)">LOST (3X)</button>
    </div>

    <div class="history-card">
        <h3>STREAK LOGS (5 SLOT)</h3>
        <div class="table-wrap">
            <table id="historyTable">
                <tbody id="logBody"></tbody>
            </table>
        </div>
        <!-- NAYA COPY OPTION -->
        <button class="copy-btn" onclick="copySymbols()">Copy History Symbols</button>
        <button onclick="localStorage.clear(); location.reload();" style="width:100%; background:none; border:none; color:#222; font-size:9px; margin-top:15px; cursor:pointer;">PURGE MEMORY</button>
    </div>
</div>

<script>
    let currentLvl = 1;
    let lastProcessedId = "";
    let logs = JSON.parse(localStorage.getItem('gking_v100_logs')) || [];

    window.onload = () => { updateHistoryUI(); startTimer(); syncEngine(); };

    function startTimer() {
        setInterval(() => {
            const now = new Date();
            const rem = 30 - (now.getSeconds() % 30);
            document.getElementById('timerText').innerText = "00:" + (rem < 10 ? "0" + rem : rem);
        }, 1000);
    }

    async function syncEngine() {
        const api = 'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json';
        try {
            const res = await fetch(api);
            const data = await res.json();
            const latest = data.data.list[0];
            const nextId = (BigInt(latest.issueNumber) + 1n).toString();
            document.getElementById('periodId').innerText = "PERIOD ID: " + nextId;

            if (lastProcessedId !== latest.issueNumber) {
                if (lastProcessedId) autoLog(latest, data.data.list);
                runPrediction(data.data.list);
                lastProcessedId = latest.issueNumber;
            }
        } catch (e) { }
        setTimeout(syncEngine, 1500);
    }

    function runPrediction(list) {
        const n1 = parseInt(list[0].number);
        const p1 = parseInt(list[1].number);
        const lastActualSize = n1 >= 5 ? "BIG" : "SMALL";
        
        // Reverse Clone Logic
        const checkFs = [
            { id: "SQR", c: (p1 * p1) % 10 },
            { id: "MOD", c: (p1 + parseInt(list[1].issueNumber.slice(-1))) % 10 },
            { id: "LIN", c: (p1 * 3 + 7) % 10 }
        ];
        let winner = checkFs.find(f => (f.c >= 5 ? "BIG" : "SMALL") === lastActualSize) || checkFs[0];

        let val = 0;
        const idDigit = parseInt(list[0].issueNumber.slice(-1));
        if(winner.id === "SQR") val = (n1 * n1) % 10;
        else if(winner.id === "MOD") val = (n1 + idDigit) % 10;
        else val = (n1 * 3 + 7) % 10;

        let prediction = val >= 5 ? "BIG" : "SMALL";
        window.currentSizePred = prediction;
        window.currentNumPred = val;

        const pEl = document.getElementById('prediction');
        pEl.innerText = prediction;
        pEl.style.color = (prediction === "BIG") ? "var(--cyan)" : "var(--neon)";
        document.getElementById('targetNum').innerText = val;
    }

    function autoLog(latest, list) {
        const actualRes = parseInt(latest.number) >= 5 ? "BIG" : "SMALL";
        const isWin = window.currentSizePred === actualRes;
        
        logs.unshift({
            id: latest.issueNumber.slice(-3),
            res: actualRes,
            sts: isWin ? "WIN" : "LOSS",
            sym: isWin ? "✓" : "✗"
        });

        if (logs.length > 5) logs.pop();
        localStorage.setItem('gking_v100_logs', JSON.stringify(logs));
        updateHistoryUI();
    }

    function updateHistoryUI() {
        const body = document.getElementById('logBody');
        body.innerHTML = logs.map(l => `
            <tr>
                <td>ID:${l.id}</td>
                <td style="color:${l.res === 'BIG' ? 'var(--cyan)' : 'var(--neon)'}">${l.res}</td>
                <td class="${l.sts === 'WIN' ? 'win-t' : 'loss-t'}">${l.sym}</td>
            </tr>
        `).join('');
    }

    // --- FIX FOR COPYING SYMBOLS ---
    function copySymbols() {
        if (logs.length === 0) { alert("Pehle results aane do!"); return; }
        
        // Collect symbols from history array
        const symbolSequence = logs.map(l => l.sym).join(" ");
        
        const dummy = document.createElement("textarea");
        document.body.appendChild(dummy);
        dummy.value = symbolSequence;
        dummy.select();
        dummy.setSelectionRange(0, 99999); 
        
        try {
            document.execCommand("copy");
            alert("✓ Symbols Copied: " + symbolSequence);
        } catch (err) {
            alert("Copy failed!");
        }
        document.body.removeChild(dummy);
    }

    function handleResult(win) {
        if (win) currentLvl = 1;
        else {
            if (currentLvl === 1) currentLvl = 2;
            else { currentLvl = 1; alert("GUARD RESET!"); }
        }
        document.getElementById('lvlStep').innerText = "L " + currentLvl;
        document.getElementById('betAmt').innerText = (currentLvl === 1 ? "₹10" : "₹30");
    }
</script>
</body>
</html>
